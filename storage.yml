#run plan to compare current raw form
- stage: TerraformPlan
  displayName: 'Terraform Plan'
  dependsOn: InstallAzureCLIandTerraform
  condition: eq(variables.RUN_BOOTSTRAP, false)
  jobs:
  - job: TerraformPlan
    displayName: 'Terraform Plan'
    steps:
    - bash: |
        echo "=========================================="
        echo "VALIDATING PARAMETERS"
        echo "=========================================="
        echo "Resource Group Parameter: $(RESOURCE_GROUP)"
        echo "Working Directory: $(System.DefaultWorkingDirectory)/$(RESOURCE_GROUP)"
        echo ""
        
        if [ -z "$(RESOURCE_GROUP)" ]; then
          echo "##[error]ERROR: Resource Group Name parameter is EMPTY!"
          echo "##[error]You must provide a resource group name when running the pipeline."
          exit 1
        fi
        
        if [ ! -d "$(System.DefaultWorkingDirectory)/$(RESOURCE_GROUP)" ]; then
          echo "##[error]ERROR: Directory does not exist: $(System.DefaultWorkingDirectory)/$(RESOURCE_GROUP)"
          echo ""
          echo "Available directories:"
          ls -la $(System.DefaultWorkingDirectory)/
          exit 1
        fi
        
        echo "✓ Directory exists"
        echo ""
        echo "Terraform files found:"
        ls -la $(System.DefaultWorkingDirectory)/$(RESOURCE_GROUP)/*.tf 2>/dev/null || echo "⚠ No .tf files found!"
      displayName: "Validate Parameters and Directory"
    
    - bash: |
        echo "Verifying Terraform is available..."
        terraform version || {
          echo "Terraform not found, installing..."
          TERRAFORM_VERSION="1.7.5"
          wget -q https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
          unzip -o terraform_${TERRAFORM_VERSION}_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          sudo chmod +x /usr/local/bin/terraform
          rm terraform_${TERRAFORM_VERSION}_linux_amd64.zip
          terraform version
        }
      displayName: "Ensure Terraform is Available"
    
    - task: AzureCLI@2
      displayName: Terraform Init
      inputs:
        azureSubscription: 'R-CSSPZ-MI-MAN-PRD-001'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(RESOURCE_GROUP)'
        inlineScript: |
          echo "=========================================="
          echo "DEBUG: Terraform Init"
          echo "=========================================="
          echo "Current directory: $(pwd)"
          echo "Resource Group variable: $(RESOURCE_GROUP)"
          echo "System.DefaultWorkingDirectory: $(System.DefaultWorkingDirectory)"
          echo ""
          echo "Files in current directory:"
          ls -lah
          echo ""
          echo "Terraform files:"
          ls -lah *.tf
          echo ""
          echo "Initializing Terraform..."
          terraform init -reconfigure \
            -backend-config="subscription_id=c5d43e46-3c8c-44d4-bb60-f3ba38da13ef" \
            -backend-config="resource_group_name=R-CSSPZ-RG-MAN-NONPRD-001" \
            -backend-config="storage_account_name=mcsspzsamanonprod001" \
            -backend-config="container_name=tfexport" \
            -backend-config="key=$(RESOURCE_GROUP)-NONPRD.tfstate"
      env:
        ARM_SUBSCRIPTION_ID: 'c5d43e46-3c8c-44d4-bb60-f3ba38da13ef'
        ARM_USE_AZUREAD: 'true'
        ARM_SKIP_CLI: 'true'

    - task: AzureCLI@2
      displayName: Terraform Plan
      inputs:
        azureSubscription: 'R-CSSPZ-MI-MAN-PRD-001'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(RESOURCE_GROUP)'
        inlineScript: |
          echo "=========================================="
          echo "DEBUG: Terraform Plan"
          echo "=========================================="
          echo "Current directory: $(pwd)"
          echo ""
          echo "Files in current directory:"
          ls -lah
          echo ""
          echo "Checking if .terraform directory exists:"
          ls -lah .terraform/ || echo "No .terraform directory found!"
          echo ""
          echo "Checking terraform.tfvars file:"
          if [ -f "terraform.tfvars" ]; then
            echo "terraform.tfvars found. Contents:"
            cat terraform.tfvars
          else
            echo "⚠ WARNING: terraform.tfvars not found!"
          fi
          echo ""
          echo "Running Terraform plan..."
          terraform plan -var-file=terraform.tfvars -out=tfplan
      env:
        ARM_SUBSCRIPTION_ID: 'c5d43e46-3c8c-44d4-bb60-f3ba38da13ef'
        ARM_USE_AZUREAD: 'true'
        ARM_SKIP_CLI: 'true'

- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: TerraformPlan
  condition: eq(variables.RUN_BOOTSTRAP, false)
  jobs:
  - deployment: TerraformApply
    displayName: 'Terraform Apply'
    environment: 'production'
    strategy: 
      runOnce:
        deploy:
          steps:
          - bash: |
              echo "Verifying Terraform is available..."
              terraform version || {
                echo "Terraform not found, installing..."
                TERRAFORM_VERSION="1.7.5"
                wget -q https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
                unzip -o terraform_${TERRAFORM_VERSION}_linux_amd64.zip
                sudo mv terraform /usr/local/bin/
                sudo chmod +x /usr/local/bin/terraform
                rm terraform_${TERRAFORM_VERSION}_linux_amd64.zip
                terraform version
              }
            displayName: "Ensure Terraform is Available"

          - task: AzureCLI@2
            displayName: Terraform Init
            inputs:
              azureSubscription: 'R-CSSPZ-MI-MAN-PRD-001'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/$(RESOURCE_GROUP)'
              inlineScript: |
                echo "Initializing Terraform for Apply..."
                terraform init -reconfigure \
                  -backend-config="subscription_id=c5d43e46-3c8c-44d4-bb60-f3ba38da13ef" \
                  -backend-config="resource_group_name=R-CSSPZ-RG-MAN-NONPRD-001" \
                  -backend-config="storage_account_name=mcsspzsamanonprod001" \
                  -backend-config="container_name=tfexport" \
                  -backend-config="key=$(RESOURCE_GROUP)-NONPRD.tfstate"
            env:
              ARM_SUBSCRIPTION_ID: 'c5d43e46-3c8c-44d4-bb60-f3ba38da13ef'
              ARM_USE_AZUREAD: 'true'
              ARM_SKIP_CLI: 'true'

          - task: AzureCLI@2
            displayName: Terraform Apply (Auto-Approved)
            inputs:
              azureSubscription: 'R-CSSPZ-MI-MAN-PRD-001'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/$(RESOURCE_GROUP)'
              inlineScript: |
                echo "=========================================="
                echo "TERRAFORM APPLY - AUTO APPROVED"
                echo "=========================================="
                echo "Resource Group: $(RESOURCE_GROUP)"
                echo "Subscription: c5d43e46-3c8c-44d4-bb60-f3ba38da13ef"
                echo ""
                echo "Applying Terraform configuration..."
                terraform apply -var-file=terraform.tfvars -auto-approve
            env:
              ARM_SUBSCRIPTION_ID: 'c5d43e46-3c8c-44d4-bb60-f3ba38da13ef'
              ARM_USE_AZUREAD: 'true'
              ARM_SKIP_CLI: 'true'
