# ------------------------------------------------------------------------------------ #
# Description:
#   Pipeline to upload state file
# ------------------------------------------------------------------------------------ #

trigger: none

pool:
  name: M-CSSPZ-PBA-MAN-PRD-005

# ============================================================
# Mandatory Pipeline Parameter (User must enter RG at runtime)
# ============================================================
parameters:
  - name: runBootstrap
    type: boolean
    default: false

  - name: resourceGroupName
    displayName: "Resource Group Name"
    type: string
    default: "M-CSSPZ-RG-MAN-PRD-002"
    # HARD-CODED FOR TESTING

# ============================================================
# Variables
# ============================================================
variables:
  RESOURCE_GROUP: ${{ parameters.resourceGroupName }}
  RUN_BOOTSTRAP: ${{ parameters.runBootstrap }}

stages:

- stage: InstallAzureCLIandTerraform
  jobs:
    - job: InstallCLI
      steps:
        - bash: |
            echo "Detecting OS..."
            if command -v apt-get >/dev/null 2>&1; then
              echo "Ubuntu/Debian detected"
              curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

            elif command -v yum >/dev/null 2>&1; then
              echo "RHEL/CentOS/Amazon Linux detected"
              sudo rpm --import https://packages.microsoft.com/keys/microsoft.asc
              sudo yum install -y https://packages.microsoft.com/config/rhel/8/packages-microsoft-prod.rpm || \
              sudo yum install -y https://packages.microsoft.com/config/amazonlinux/2/packages-microsoft-prod.rpm
              sudo yum install -y azure-cli

            elif command -v dnf >/dev/null 2>&1; then
              echo "Fedora/RHEL9 detected"
              sudo rpm --import https://packages.microsoft.com/keys/microsoft.asc
              sudo dnf install -y https://packages.microsoft.com/config/rhel/9/packages-microsoft-prod.rpm
              sudo dnf install -y azure-cli

            elif command -v apk >/dev/null 2>&1; then
              echo "Alpine detected"
              apk add --no-cache python3 py3-pip
              pip3 install azure-cli

            else
              echo "Unknown Linux distribution — cannot auto-install Azure CLI."
              exit 1
            fi
          displayName: "Install Azure CLI"

        - bash: |
            echo "Verifying Azure CLI..."
            az --version
          displayName: "Verify Azure CLI"

        - bash: |
            echo "Installing Terraform..."
            TERRAFORM_VERSION="1.7.5"  # Specify a stable version
            
            # Download Terraform
            wget -q https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
            
            # Unzip
            unzip -o terraform_${TERRAFORM_VERSION}_linux_amd64.zip
            
            # Move to bin and make executable
            sudo mv terraform /usr/local/bin/
            sudo chmod +x /usr/local/bin/terraform
            
            # Clean up
            rm terraform_${TERRAFORM_VERSION}_linux_amd64.zip
            
            echo "Terraform installed successfully"
          displayName: "Install Terraform"

        - bash: |
            echo "Verifying Terraform installation..."
            terraform version
            which terraform
          displayName: "Verify Terraform"

